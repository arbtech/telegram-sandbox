name: Telegram Channel Downloader

# ──────────────────────────────────────────────────────────────────────────────
# Trigger: any push to main/master whose commit message contains [tg:<channel_id>]
#
# Example commit messages that will trigger a download:
#   "fetch assets [tg:-1001234567890]"
#   "[tg:-1001234567890] grab channel files"
#
# Required repository secrets:
#   TG_API_ID    – your Telegram API ID   (https://my.telegram.org)
#   TG_API_HASH  – your Telegram API hash
#   TG_SESSION   – session string from create-session.ts
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
      - master

jobs:
  download:
    name: Download & archive Telegram files
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to push the downloaded zips back to the repo

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── 2. Parse commit message ───────────────────────────────────────────────
      - name: Extract channel ID from commit message
        id: parse
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          echo "Commit message: $COMMIT_MSG"

          CHANNEL_ID=$(printf '%s' "$COMMIT_MSG" \
            | sed -En 's/.*\[tg:(-?[0-9]+)\].*/\1/p' \
            | head -1)

          if [[ -z "$CHANNEL_ID" ]]; then
            echo "::notice::No [tg:<id>] token found in commit message — skipping download."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Found Telegram channel ID: $CHANNEL_ID"
            echo "found=true"           >> "$GITHUB_OUTPUT"
            echo "channel=$CHANNEL_ID"  >> "$GITHUB_OUTPUT"
          fi

      # ── 3. Setup Bun (runtime only — npm handles install) ────────────────────
      - name: Setup Bun
        if: steps.parse.outputs.found == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── 4. Cache npm packages ─────────────────────────────────────────────────
      - name: Cache npm packages
        if: steps.parse.outputs.found == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # ── 5. Install dependencies via npm ──────────────────────────────────────
      # npm is used here instead of bun because bun install hangs in this CI
      # environment. The script itself still runs under bun.
      - name: Install dependencies
        if: steps.parse.outputs.found == 'true'
        run: npm install --ignore-scripts

      # ── 6. Run downloader ────────────────────────────────────────────────────
      - name: Download files from Telegram channel
        if: steps.parse.outputs.found == 'true'
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          TG_CHANNEL_ID: ${{ steps.parse.outputs.channel }}
        run: |
          echo "::group::Telegram downloader output"
          bun run scripts/download-channel.ts
          echo "::endgroup::"

      - name: Split large files into 90MB chunks
        run: |
          echo "🔧 Processing downloaded files for splitting..."

          LIMIT=$((90 * 1024 * 1024))  # 90MB

          for FILE in downloads/*; do
            [ -f "$FILE" ] || continue

            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")

            # Remove extension
            NAME="${BASENAME%.*}"

            # Convert to clean kebab-case
            FOLDERNAME=$(echo "$NAME" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9]/-/g' \
              | sed 's/-\+/-/g' \
              | sed 's/^-//;s/-$//')

            echo "📄 $BASENAME ($(numfmt --to=iec-i --suffix=B $SIZE))"

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ Splitting large file → Folder: $FOLDERNAME"

              # Create destination folder
              mkdir -p "downloads/$FOLDERNAME"

              # Move original file into folder
              mv "$FILE" "downloads/$FOLDERNAME/$BASENAME"

              # Enter folder
              cd "downloads/$FOLDERNAME" || exit 1

              # Create multipart zip INSIDE the folder
              zip -s 90m "${FOLDERNAME}.zip" "$BASENAME" -q

              # Remove original file after successful zip
              rm -f "$BASENAME"

              cd ../..

              echo "✅ Multipart zip created in downloads/$FOLDERNAME/"
            else
              echo "✅ File under 90MB → kept as single file"
            fi
          done

          echo "🎉 All files processed successfully"

      # ── 7. Commit & push downloads ───────────────────────────────────────────
      - name: Commit downloads to repository
        if: steps.parse.outputs.found == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add downloads/

          if git diff --cached --quiet; then
            echo "::notice::No new files — nothing to commit."
          else
            CHANNEL="${{ steps.parse.outputs.channel }}"
            git commit -m "chore(tg): archive downloads from channel ${CHANNEL} [skip ci]"
            git push
            echo "::notice::Downloads committed and pushed successfully."
          fi
